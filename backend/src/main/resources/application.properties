# Database Configuration (works with both MySQL and PostgreSQL)
# Handle Render's DATABASE_URL which may not include 'jdbc:' prefix
spring.datasource.url=jdbc:${DATABASE_URL:h2:mem:testdb}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Database-specific dialects
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# For MySQL (Aiven/Render) - set DB_DIALECT=org.hibernate.dialect.MySQLDialect
# For PostgreSQL - set DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect
# For H2 (development) - uses H2Dialect by default