services:
  - type: web
    name: employee-hrms-backend
    plan: free
    runtime: java
    runtimeVersion: 17
    buildCommand: cd backend && mvn clean package -Dmaven.test.skip=true
    startCommand: cd backend && java -jar target/employee-hrms-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://your-mysql-host:3306/hrms_db
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: mysql
          property: username
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: mysql
          property: password

  - type: web
    name: employee-hrms-frontend
    plan: free
    runtime: node
    runtimeVersion: 22
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://your-backend-url.onrender.com
